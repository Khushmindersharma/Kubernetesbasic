# Deploying and scaling an Amazon EKS Cluster
# Step-1:- Install and configure the AWS CLI.

# Step-2:- Install kubectl
# curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
# sudo install -o root -g root -m 0755 kubectl  /usr/local/bin/kubectl

# Step-3:-Install the eksctl command-line tool

# ``` bash

# for ARM sstems,set ARCH to: 'arm64',`armv6` or `armv7'

#ARCH=amd64\
#PLATFORM=$(uname -s)_$ARCH

# curl -sLO "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"

# verify checksum\

# curl -sL "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_checksums.txt" | grep $PLATFORM | sha256sum --check
# tar -xzf eksctl_$PLATFORM.tar.gz -C /tmp && rm eksctl_$PLATFORM.tar.gz

# sudo mv /tmp/eksctl /usr/local/bin

# ```
# Save the above script as `eksctl.sh` then run `chmod +x eksctl.sh`  and `sudo sh eksctl.sh`
# Create a new amazon EKS cluster using the `eksctl` command:
# ```bash
# eksctl create cluster --name my-eks-cluster --region us-east-1 --nodegroup-name my-nodegroup --node-type t2.micro --nodes 3 --nodes-min 1 --nodes-max 5 --managed
# ```
# Replace `my-eks-cluster` and `us-east-1` with your perferred cluster name and AWS region

# deploying a sample application

# Create a new file named `deployment.yaml` with the following content:
#```yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 3
  template:
    metadata:
      labels: 
        app: nginx
    spec:
      containers: 
      - name: nginx 
        image: nginx:1.14.2
        ports:
        - containerPort: 80
# ```

# 2. Deploy the sample application to your elks cluster
# kubectl apply -f deployment.yaml

# Expose the application

# 1.Expose the application using a kubernetes service:

# ``` bash
# kubectl expose deployment nginx-deployment --type=LoadBalancer --name=my-service

# Get the external IP ADDRESS of the Load Balancers:

# ```bash
# kubectl get services my-service
# ```

# You can access the sample application using the external IP ADDRESS and port number.
# setting up horizontal pod autoscaler (HPA)

