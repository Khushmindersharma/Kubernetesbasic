# apiVersion: 
# is the code library which we want to use to create the object in the cluster.
# It is a stable version of the API which we want to use to create the object 
# in the cluster. It is a mandatory field in the manifest file. It is used to 
# specify the version of the API which we want to use to create the object in 
# the cluster.

# what is kind?

# what kind of object we want to create in the cluster. It is a mandatory 
# field in the manifest file.

# kind: Pod
# kind: Deployment
# kind: Service
# kind: Ingress
# kind: job

# what is metadata?

# metadata is the information about the object we want to create in the cluster
# Additional information about the object like name,labels etc.
# name : the name of the Deployemnt/pod service etc.
# labels: it is a key value pair which we can use to label the object we want to create 
# in the cluster. It is used to identify the object we want to create in the cluster. 
# It is used to group the objects we want to create in the cluster. It is used to select 
# the objects we want to create in the cluster.


# what is spec?

# Contains docker container related info like,image name,environment variables,
# port mapping etc. How many number os pods (replicas)
# about container and that should run on which image. On which port it should expose.
# labeling the entire deployemnt etc.

# Sample manifest file for creating a pod:

# apiVersion: v1
# kind: Pod -- creating pod object in the cluster
# metadata:
#   name: pod1 -- name of the pod which we want to create in the cluster
#   labels:
#     app: myapp
# spec: -- specification of the pod which we want to create in the cluster
#   containers:
#   - image: nginx --image name
#     name: contl -- container name
#     ports:
#     - containerPort: 80


