# difference between replicaSet and deployment:
# replicaSet is used to maintain the desired number of replicas of a pod in the cluster.
# deployment is used to manage the replicaSet and it provides features like rolling 
# update, rollback etc.
# with deployment we can do roll out and roll back but with replicaSet we cannot do roll 
# out and roll back. 

# kubectl describe pod | grep -i ID
