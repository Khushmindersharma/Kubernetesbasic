# kubernetes Jobs: it is a resource in Kubernetes which is used to run a batch job. 
# they ensure that a specified number of pods successfully complete a task before
# marking the job as complete/done. such as data migration, backup,or batch processing.
# non-parallel jobs: run a single pod to completion.

# completions: 3 means that the job will run until 3 successful completions
# of the pod. parallel jobs: run multiple pods in parallel to complete the 
#job faster.

# restartPolicy: Never means that the pod will not be restarted if it fails.Use case Jobs/CronJobs one-time execution.
# OnFailure means that the pod will be restarted if it fails. Always means that 
# the pod will be restarted regardless of the exit status. use case Jobs & CronJobs  
# Always is not recommended for jobs because it can lead to infinite loops 
# if the job fails repeatedly.use case Default for Deployments & ReplicaSets.

# completions: 3 means that the job will run until 3 successful completions 
# of the pod.
# parallelism: 2 means that the job will run 2 pods in parallel to complete 
# the job faster. If parallelism is not specified, it defaults to 1, meaning 
# that the job will run one pod at a time until the specified number of 
# completions is reached. If parallelism is greater than the number of 
