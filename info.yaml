# rolling update: it is a process of updating the application without downtime. 
# It is a process of updating the application without affecting the availability 
# of the application. Deleting the old pod and creating new pod with new image. 
# It is a process of updating the application without affecting the user experience. 
# It is a process of updating the application  without affecting the performance of
# the application. 
# It is a process of updating the application without affecting the user experience.
# It is a process of updating the application without affecting the performance of 
#the application.

# Recreate: Delete all pods and create again-Downtime. Not Recommended.

# Blue-Green Deployment: Two identical environments, one active (blue) and one idle (green). Switch traffic to green 
# after testing. Minimal downtime. Done manually or with tools.

# Canary Deployment: Gradually roll out changes to a small subset of users before full deployment. 
# Monitor performance and rollback if issues arise. Requires traffic routing capabilities.

