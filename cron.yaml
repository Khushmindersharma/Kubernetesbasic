apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cron
spec:
  schedule: "*/1 * * * *" # This means the job will run every minute.
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: hello-container
            image: busybox
            command: ["sh", "-c", "date; echo Hello from the Kubernetes cluster!"]
          restartPolicy: Never # Ensure jobs runs only once per schedule.